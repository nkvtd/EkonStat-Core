services:
  dashboard:
    image: ghcr.io/nkvtd/ekonstat-dashboard:latest
    container_name: dashboard
    restart: unless-stopped
    environment:
      API_UPSTREAM: ${API_UPSTREAM}
    networks:
      - edge-proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
      POSTGRES_DB: ${POSTGRES_DB:-ekonstat-db}
    secrets:
      - database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    container_name: app
    image: ghcr.io/nkvtd/ekonstat-api:latest
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /run/secrets/database_password ]; then
          echo "/run/secrets/database_password is missing." >&2
          exit 1
        fi
        DB_PASSWORD="$$(cat /run/secrets/database_password | tr -d '\r\n')"
        export DATABASE_URL="postgresql://$${POSTGRES_USER:-postgres}:$${DB_PASSWORD}@postgres:5432/$${POSTGRES_DB:-ekonstat-db}"
        exec npm run start:app
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ekonstat-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      PORT: ${PORT:-8080}
    secrets:
      - database_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/ready > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - edge-proxy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  scheduler:
    container_name: scheduler
    image: ghcr.io/nkvtd/ekonstat-api:latest
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /run/secrets/database_password ]; then
          echo "/run/secrets/database_password is missing." >&2
          exit 1
        fi
        DB_PASSWORD="$$(cat /run/secrets/database_password | tr -d '\r\n')"
        export DATABASE_URL="postgresql://$${POSTGRES_USER:-postgres}:$${DB_PASSWORD}@postgres:5432/$${POSTGRES_DB:-ekonstat-db}"
        exec npm run start:scheduler
    restart: unless-stopped
    env_file:
      - path: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ekonstat-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    secrets:
      - database_password
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  backfiller:
    container_name: backfiller
    image: ghcr.io/nkvtd/ekonstat-api:latest
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /run/secrets/database_password ]; then
          echo "/run/secrets/database_password is missing." >&2
          exit 1
        fi
        DB_PASSWORD="$$(cat /run/secrets/database_password | tr -d '\r\n')"
        export DATABASE_URL="postgresql://$${POSTGRES_USER:-postgres}:$${DB_PASSWORD}@postgres:5432/$${POSTGRES_DB:-ekonstat-db}"
        exec npm run start:backfiller
    restart: "no"
    profiles:
      - backfill
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ekonstat-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    secrets:
      - database_password
    depends_on:
      postgres:
        condition: service_healthy


  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel run
    profiles:
      - tunnel
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - edge-proxy

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:1.13.1
    restart: unless-stopped
    profiles:
      - watchtower
    environment:
      WATCHTOWER_UPDATE_ON_START: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_NOTIFICATION_URL: "${WATCHTOWER_NOTIFICATION_URL:-discord://token@channelid}"
      WATCHTOWER_NOTIFICATION_LEVEL: "info"
      WATCHTOWER_NOTIFICATION_SPLIT_BY_CONTAINER: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  migrate:
    container_name: migrate
    image: ghcr.io/nkvtd/ekonstat-api:latest
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -f /run/secrets/database_password ]; then
          echo "/run/secrets/database_password is missing." >&2
          exit 1
        fi
        DB_PASSWORD="$$(cat /run/secrets/database_password | tr -d '\r\n')"
        export DATABASE_URL="postgresql://$${POSTGRES_USER:-postgres}:$${DB_PASSWORD}@postgres:5432/$${POSTGRES_DB:-ekonstat-db}"
        exec npm run db:migrate
    profiles:
      - tools
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ekonstat-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    secrets:
      - database_password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

secrets:
  database_password:
    file: ./secrets/database_password.txt

networks:
  edge-proxy:
    external: true