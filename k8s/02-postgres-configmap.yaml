apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: ekonstat
  labels:
    app: postgres
    app.kubernetes.io/part-of: ekonstat
data:
  init-replication.sql: |
    CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'repl_password';
    GRANT CONNECT ON DATABASE "ekonstat-db" TO replicator;
