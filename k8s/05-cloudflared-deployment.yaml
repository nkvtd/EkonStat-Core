apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ekonstat
  labels:
    app: cloudflared
    app.kubernetes.io/part-of: ekonstat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
        app.kubernetes.io/part-of: ekonstat
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: Always
          command:
            - cloudflared
            - tunnel
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ekonstat-secrets
                  key: tunnel_token
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
