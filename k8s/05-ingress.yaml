apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ekonstat-ingress
  namespace: ekonstat
  labels:
    app.kubernetes.io/part-of: ekonstat
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
